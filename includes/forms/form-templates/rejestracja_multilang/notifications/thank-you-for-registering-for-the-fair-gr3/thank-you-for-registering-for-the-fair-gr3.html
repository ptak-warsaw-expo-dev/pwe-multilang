<!DOCTYPE html>

<html lang="en">
<head>
<title>{{notification_title}}</title>
</head>
<body style="
      text-align: justify;
      max-width: 600px;
      margin: 0 auto;
      font-family: 'Open Sans', 'Montserrat', sans-serif;
    ">
<div>
<img alt="[trade_fair_name]" src="https://[trade_fair_domainadress]/doc/ticket/heder_Bilet-Branzowy_EN.png" style="width: 100%"/>
</div>
<div style="padding: 0 5px">
<h3 style="font-size: 18px; margin: 20px 0 10px; text-align: left;">
      {{greeting}}
    </h3>
<p style="font-size: 14px; margin: 25px 0 10px; text-align: center;">
      {{registration_participation_intro}}
    </p>
<p style="font-size: 14px; margin: 25px 0 10px; text-align: center;">
<b>{{event_details_notice}}</b>
</p>
<div style="width:142px; margin: 25px auto; ">
<a href="https://[trade_fair_domainadress]/lang/?utm_source=rejpl&amp;utm_medium=mail&amp;utm_campaign=qrmail" style="text-align: center; padding: 9px 20px 7px;  text-decoration: none; color: white; background-color: [trade_fair_main2]; border-radius: 16px; font-weight: 600;" target="_blank">{{learn_more_label}}</a>
</div>
<div style="width: 95%; border-bottom:1px solid rgba(188,188,188, .4); margin:15px auto;"></div>
<h3 style="font-size: 18px; text-align: center;">{{free_ticket_label}}</h3>
<table border="0" cellpadding="0" cellspacing="0" width="100%">
<tr align="center">
<td align="left" style="display: inline-block;  width:100%;  max-width: 275px; font-size:15px; margin-left:15px; margin-bottom:25px; line-height: 25px;">
<b>{{ticket_benefits_title}}</b><br/>
        [trade_fair_registration_benefits_en]
        </td>
<td align="center" class="no-mobile-width" style="display: inline-block; width:100%; max-width: 275px;" valign="center">
<div style="border:3px solid [trade_fair_main2]; width: 80%; margin: 12px auto; padding:20px 3px 20px 3px;  border-radius:20px;">
            [pwe_qr_img]
          </div>
<p style="font-size:11px; line-height: 18px;">{{qr_blocking_notice}}</p>
</td>
</tr>
</table>
<table border="0" cellpadding="0" cellspacing="0" width="100%">
<tr align="center">
<td align="center" style="display: inline-block;  width:100%;  max-width: 275px; padding-top:15px;" valign="top">
<a href="https://[trade_fair_domainadress]/en/conferences/?utm_source=rejpl&amp;utm_medium=mail&amp;utm_campaign=qrmail" style="display:inline-block; padding:9px 20px 7px; text-decoration:none; color:white; background-color:[trade_fair_main2]; border-radius:16px; font-weight:600; font-size:15px; line-height:25px;" target="_blank">
            {{conference_section_label}}
          </a>
</td>
<td align="center" class="no-mobile-width" style="display: inline-block; width:100%; max-width: 275px; padding-top:15px;" valign="center">
<a href="https://[trade_fair_domainadress]/en/add-to-calendar/" style="display:inline-block; padding:9px 20px 7px; text-decoration:none; color:white; background-color:[trade_fair_main2]; border-radius:16px; font-weight:600; font-size:15px; line-height:25px;" target="_blank">
            {{add_to_calendar_label}}
          </a>
<img alt="Kalendarz" src="https://[trade_fair_domainadress]/wp-content/plugins/pwe-media/ticket/kalendarz.png" style="display:block; max-width:100%; height:auto;  padding-top:10px;"/>
</td>
</tr>
</table>
<div style="width: 95%; border-bottom:1px solid rgba(188,188,188, .4); margin:15px auto;"></div>
<table border="0" cellpadding="0" cellspacing="0" style="min-width:100%; background:url(https://[trade_fair_domainadress]/wp-content/plugins/PWElements/media/belka.jpg)" width="100%">
<tr>
<td style="display: inline-block;  width: 48%; font-size:15px; padding:5px 0; min-width: 48%;">
<a class="btn__fb" href="https://warsawexpo.eu/" style="display: inline-block; width: 50px;  padding: 5px 5px 5px 15px" target="_blank">
<img alt="fb__icon" src="https://[trade_fair_domainadress]/wp-content/plugins/PWElements/media/logo_pwe_ufi.webp" style="width:70px; height:40px;"/>
</a>
</td>
<td align="center" style="display: inline-block;  width: 50%; padding:5px 0; min-width: 48%;" valign="center">
<div align="end" class="socials" style="margin: 0px 0">
<a class="btn__fb" href="[trade_fair_linkedin]" style="display: inline-block; width: 40px;  padding-right: 10px;" target="_blank">
<img alt="linked__icon" src="https://[trade_fair_domainadress]/wp-content/plugins/pwe-media/ticket/media_linkedin.png" style="width:40px; height:40px;"/>
</a>
<a class="btn__fb" href="[trade_fair_facebook]" style="display: inline-block; width: 40px;  padding-right: 10px;" target="_blank">
<img alt="insta__icon" src="https://[trade_fair_domainadress]/wp-content/plugins/PWElements/media/fb-cc.png" style="width:40px; height:40px;"/>
</a>
<a class="btn__fb" href="[trade_fair_youtube]" style="display: inline-block; width: 40px;  padding-right: 10px;" target="_blank">
<img alt="yt__icon" src="https://[trade_fair_domainadress]/wp-content/plugins/pwe-media/ticket/media_yt.png" style="width:40px; height:40px;"/>
</a>
<a class="btn__fb" href="[trade_fair_instagram]" style="display: inline-block; width: 40px; padding-right: 10px; " target="_blank">
<img alt="insta__icon" src="https://[trade_fair_domainadress]/wp-content/plugins/PWElements/media/instagram-cc.png" style="width:40px; height:40px;"/>
</a>
</div>
</td>
</tr>
</table>
<p class="footer__rodo" style="margin-top: 10px; padding: 0 5px; font-size: 12px">
   {{privacy_notice}}
    </p>
</div></body>
</html>
