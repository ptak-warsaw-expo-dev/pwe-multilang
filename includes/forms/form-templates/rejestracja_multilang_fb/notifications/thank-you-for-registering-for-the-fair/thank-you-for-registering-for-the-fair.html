<!DOCTYPE html>

<html lang="{{html_lang}}">
<head>
<title>{{notification_title}}</title>
</head>
<body style="
      text-align: justify;
      max-width: 600px;
      margin: 0 auto;
      font-family: 'Open Sans', 'Montserrat', sans-serif;
    ">
<div>
<img alt="[trade_fair_name]" src="https://[trade_fair_domainadress]/doc/header.jpg" style="width: 100%"/>
</div>
<div style="padding: 0 5px">
<h3 style="font-size: 20px; margin: 20px 0 10px">{{greeting_with_name}}</h3>
<p style="font-size: 14px; margin: 0 0 10px">{{registration_intro}}<a href="https://[trade_fair_domainadress]/" target="_blank">[trade_fair_domainadress]</a>.
    </p>
<table border="0" cellpadding="0" cellspacing="0" width="100%">
<tr>
<td>
<table border="0" cellpadding="10" cellspacing="0" width="100%">
<tr align="center">
<td style="display: inline-block; width: 100%; max-width: 200px;" valign="center">
[pwe_qr_img]
</td>
<td align="center" style="display: inline-block; width: 100%; max-width: 300px;" valign="center">
<p style="font-size: 14px; margin: 0 0 10px">{{qr_code_instruction}}</p>
<p style="font-size: 14px; margin: 0 0 10px">{{qr_blocking_notice}}</p>
</td>
</tr>
</table>
</td>
</tr>
</table>
<p style="font-size: 14px; margin: 10px 0">{{calendar_reminder_notice}}</p>
<div align="center" class="socials" style="margin: 20px 0">
<a class="btn__fb" href="[trade_fair_facebook]" style="display: inline-block; width: 50px; margin: 0 15px; padding: 5px" target="_blank">
<img alt="fb__icon" src="https://warsawexpo.eu/docs/facebookIcon.png" style="width: 100%; height: auto"/>
</a>
<a class="btn__fb" href="[trade_fair_instagram]" style="display: inline-block; width: 50px; margin: 0 15px; padding: 5px" target="_blank">
<img alt="insta__icon" src="https://warsawexpo.eu/docs/instagramicon.png" style="width: 100%; height: auto"/>
</a>
</div>
<p class="greeting" style="font-size: 14px; margin: 30px 0 0">{{signoff}}</p>
<sub style="font-size: 12px; margin: 0">{{auto_generated_notice}}</sub>
</div>
<div style="margin: 20px 0 10px">
<img alt="email_footer" src="https://warsawexpo.eu/assets/mail/footer.jpg" style="display: block; max-width: 100%; height: auto; margin: 0"/>
<p align="center" style="
          padding: 16px;
          background-color: #000;
          color: #fff;
          margin: 0;
          line-height: 1;
        ">
      © [trade_fair_actualyear] Ptak Warsaw Expo
      <span style="display: block; margin-top: 4px">{{rights_reserved}}</span>
</p>
</div>
<p class="footer__rodo" style="margin-top: 10px; padding: 0 5px; font-size: 12px">{{privacy_notice}}</p>
</body>
</html>
